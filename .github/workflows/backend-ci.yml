name: Backend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r apps/backend/requirements.txt

      - name: Compile backend
        run: |
          python -m compileall -q \
            apps/backend/app \
            apps/backend/feature_extractor.py \
            apps/backend/train_model.py \
            apps/backend/scripts/smoke_test_fastapi.py

      - name: Run backend tests
        working-directory: apps/backend
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run backend smoke
        run: python apps/backend/scripts/smoke_test_fastapi.py
